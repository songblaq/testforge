version: "1"

project:
  name: "TestForge Self-Test"
  description: "TestForge dogfooding -- testing TestForge with TestForge"
  url: null
  created_at: "2026-03-22"

inputs:
  files:
    - path: "README.md"
    - path: "docs/getting-started.md"
    - path: "docs/cli-reference.md"
    - path: "docs/configuration.md"

target:
  type: shell
  command_prefix: ".venv/bin/testforge"

generation:
  coverage_level: standard
  include_negative: true
  include_boundary: true
  locale: en

execution:
  parallel: 1
  timeout_per_case_sec: 60
  retry_on_failure: 0
  screenshot_on_failure: false

report:
  format: [markdown]
  include_evidence: true
  locale: en
